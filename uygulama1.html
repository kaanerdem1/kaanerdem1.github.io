<!DOCTYPE html>

  <title>Öğrenci Not Hesaplama</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Öğrenci Not Hesaplama</h1>

    <div class="form-group">
      <input type="text" id="adSoyad" placeholder="Ad Soyad" />
    </div>
    <div class="form-group">
      <input type="text" id="vize" placeholder="Vize Notu" />

    <div class="form-group">
      <input type="text" id="final" placeholder="Final Notu" />

    <button id="hesaplaBtn">Hesapla</button>

    <div class="sonuc" id="sonuc" style="display: none;">
      <p class="ogrenci-ad" id="sonucAd"></p>
      <p id="sonucOrtalama"></p>
      <p id="sonucHarf"></p>
      <p id="sonucDurum"></p>
    </div>

  <script src="script.js"></script>

</html>
